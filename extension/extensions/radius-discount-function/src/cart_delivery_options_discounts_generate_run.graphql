query Input {
    cart {
        attribute(key: "_radiusDiscounts") {
            value
        }
        lines {
            id
            attribute(key: "_bundle_id") {
                value
            }
            bundleName: attribute(key: "_bundle_name") {
                value
            }
            merchandise {
                __typename
                ... on ProductVariant {
                    id
                    product {
                        id
                    }
                }
            }
        }
        deliveryGroups {
            id
        }
    }
    discount {
        discountClasses
        metafield(namespace: "$app", key: "active_bundles") {
            value
        }
    }
}
