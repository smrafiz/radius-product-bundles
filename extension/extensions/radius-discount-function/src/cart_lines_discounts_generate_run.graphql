query Input {
    cart {
        attribute(key: "_bundleDiscount") {
            value
        }
        lines {
            id
            quantity
            cost {
                subtotalAmount {
                    amount
                }
            }
            merchandise {
                __typename
                ... on ProductVariant {
                    id
                    product {
                        id
                    }
                }
            }
        }
    }
    discount {
        discountClasses
    }
}
