query Input {
    cart {
        attribute(key: "_bundleDiscounts") {
            value
        }
        lines {
            id
            quantity
            attribute(key: "_bundle_id") {
                value
            }
            productId: attribute(key: "_product_id") {
                value
            }
            cost {
                subtotalAmount {
                    amount
                }
            }
            merchandise {
                __typename
                ... on ProductVariant {
                    id
                    product {
                        id
                    }
                }
            }
        }
    }
    discount {
        discountClasses
    }
}