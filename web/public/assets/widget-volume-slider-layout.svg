<svg xmlns="http://www.w3.org/2000/svg" width="168" height="136" viewBox="0 0 168 136" fill="none">
  <rect width="168" height="136" rx="8" fill="#F9FAFB"/>
  <!-- Product image placeholder -->
  <rect x="8" y="8" width="152" height="30" rx="6" fill="#E5E7EB" opacity="0.5"/>
  <rect x="50" y="18" width="68" height="5" rx="2" fill="#9CA3AF" opacity="0.6"/>
  <!-- Save badge -->
  <rect x="120" y="10" width="36" height="14" rx="7" fill="#16A34A"/>
  <text x="125" y="20" font-size="6" fill="#fff" font-family="system-ui" font-weight="600">Save 8%</text>
  <!-- Price box -->
  <rect x="8" y="44" width="152" height="22" rx="6" fill="#fff" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="14" y="50" width="40" height="7" rx="2" fill="#6366F1" opacity="0.7"/>
  <rect x="14" y="59" width="30" height="4" rx="2" fill="#9CA3AF" opacity="0.4"/>
  <rect x="120" y="50" width="32" height="7" rx="2" fill="#16A34A" opacity="0.6"/>
  <text x="124" y="63" font-size="5" fill="#9CA3AF" font-family="system-ui">You save</text>
  <!-- Slider label -->
  <text x="8" y="78" font-size="6" fill="#374151" font-family="system-ui" font-weight="500">Select Quantity</text>
  <text x="136" y="78" font-size="7" fill="#6366F1" font-family="system-ui" font-weight="700">5 units</text>
  <!-- Slider track -->
  <rect x="8" y="84" width="152" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="8" y="84" width="76" height="4" rx="2" fill="#6366F1"/>
  <circle cx="84" cy="86" r="6" fill="#6366F1" stroke="#fff" stroke-width="2"/>
  <!-- Tick marks -->
  <text x="8" y="98" font-size="5" fill="#9CA3AF" font-family="system-ui">1</text>
  <text x="50" y="98" font-size="5" fill="#9CA3AF" font-family="system-ui">3</text>
  <text x="92" y="98" font-size="5" fill="#9CA3AF" font-family="system-ui">5</text>
  <text x="150" y="98" font-size="5" fill="#9CA3AF" font-family="system-ui">10</text>
  <!-- Progress nudge -->
  <rect x="8" y="104" width="152" height="16" rx="6" fill="#FFF9E6" stroke="#F5DEB3" stroke-width="0.5"/>
  <text x="20" y="115" font-size="5.5" fill="#92400E" font-family="system-ui">Add 2 more to save 20%!</text>
  <rect x="14" y="117" width="100" height="2" rx="1" fill="#F59E0B" opacity="0.4"/>
  <rect x="14" y="117" width="60" height="2" rx="1" fill="#F59E0B"/>
  <!-- ATC -->
  <rect x="8" y="124" width="152" height="10" rx="4" fill="#6366F1"/>
  <text x="56" y="132" font-size="6" fill="#fff" font-family="system-ui" font-weight="500">Add 5 to Cart</text>
</svg>
