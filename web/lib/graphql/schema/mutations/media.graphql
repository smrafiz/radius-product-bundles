mutation StagedUploadsCreate($input: [StagedUploadInput!]!) {
    stagedUploadsCreate(input: $input) {
        stagedTargets {
            url
            resourceUrl
            parameters {
                name
                value
            }
        }
        userErrors {
            field
            message
        }
    }
}

mutation fileDelete($fileIds: [ID!]!) {
    fileDelete(fileIds: $fileIds) {
        deletedFileIds
        userErrors {
            field
            message
            code
        }
    }
}

mutation fileUpdateRemoveRefs($files: [FileUpdateInput!]!) {
    fileUpdate(files: $files) {
        files {
            id
            alt
            fileStatus
        }
        userErrors {
            field
            message
            code
        }
    }
}
