mutation MetafieldsSet($metafields: [MetafieldsSetInput!]!) {
    metafieldsSet(metafields: $metafields) {
        metafields {
            id
            namespace
            key
            value
        }
        userErrors {
            field
            message
            code
        }
    }
}

mutation MetafieldDefinitionCreate($definition: MetafieldDefinitionInput!) {
    metafieldDefinitionCreate(definition: $definition) {
        createdDefinition {
            id
            name
            namespace
            key
        }
        userErrors {
            field
            message
            code
        }
    }
}

mutation SetActiveBundlesMetafield($ownerId: ID!, $value: String!) {
    metafieldsSet(
        metafields: [
            {
                ownerId: $ownerId
                namespace: "radius_bundles"
                key: "active_bundles"
                type: "json"
                value: $value
            }
        ]
    ) {
        metafields {
            id
            namespace
            key
        }
        userErrors {
            field
            message
        }
    }
}
