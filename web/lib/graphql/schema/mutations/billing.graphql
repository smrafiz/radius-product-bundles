mutation CreateAppSubscription(
    $name: String!
    $lineItems: [AppSubscriptionLineItemInput!]!
    $returnUrl: URL!
) {
    appSubscriptionCreate(
        name: $name
        returnUrl: $returnUrl
        lineItems: $lineItems
    ) {
        userErrors {
            field
            message
        }
        appSubscription {
            id
            name
            status
            createdAt
        }
        confirmationUrl
    }
}

mutation CancelAppSubscription($id: ID!) {
    appSubscriptionCancel(id: $id) {
        userErrors {
            field
            message
        }
        appSubscription {
            id
            status
        }
    }
}

query GetActiveSubscription {
    currentAppInstallation {
        activeSubscriptions {
            id
            name
            status
            createdAt
            trialDays
            lineItems {
                id
                plan {
                    pricingDetails {
                        ... on AppRecurringPricing {
                            price {
                                amount
                                currencyCode
                            }
                            interval
                        }
                    }
                }
            }
        }
    }
}
