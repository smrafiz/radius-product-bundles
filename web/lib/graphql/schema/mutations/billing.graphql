mutation CreateAppSubscription(
    $name: String!
    $lineItems: [AppSubscriptionLineItemInput!]!
    $returnUrl: URL!
    $test: Boolean = false
    $trialDays: Int
    $replacementBehavior: AppSubscriptionReplacementBehavior
) {
    appSubscriptionCreate(
        name: $name
        returnUrl: $returnUrl
        lineItems: $lineItems
        test: $test
        trialDays: $trialDays
        replacementBehavior: $replacementBehavior
    ) {
        userErrors {
            field
            message
        }
        appSubscription {
            id
            name
            status
            createdAt
            test
            trialDays
        }
        confirmationUrl
    }
}

mutation CancelAppSubscription($id: ID!) {
    appSubscriptionCancel(id: $id) {
        userErrors {
            field
            message
        }
        appSubscription {
            id
            status
        }
    }
}
