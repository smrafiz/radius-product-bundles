mutation ProductCreate(
    $title: String!
    $descriptionHtml: String
    $vendor: String
    $productType: String
    $tags: [String!]
    $status: ProductStatus
) {
    productCreate(
        product: {
            title: $title
            descriptionHtml: $descriptionHtml
            vendor: $vendor
            productType: $productType
            tags: $tags
            status: $status
        }
    ) {
        product {
            ...ProductFields
        }
        userErrors {
            field
            message
        }
    }
}

mutation ProductUpdate(
    $id: ID!
    $title: String
    $descriptionHtml: String
    $media: [CreateMediaInput!]
) {
    productUpdate(
        product: {
            id: $id
            title: $title
            descriptionHtml: $descriptionHtml
        }
        media: $media
    ) {
        product {
            id
            title
            descriptionHtml
            media(first: 20) {
                edges {
                    node {
                        ... on MediaImage {
                            id
                            image {
                                ...ImageFields
                            }
                        }
                    }
                }
            }
        }
        userErrors {
            field
            message
        }
    }
}