mutation ProductCreate(
    $title: String!
    $descriptionHtml: String
    $vendor: String
    $productType: String
    $tags: [String!]
    $status: ProductStatus
) {
    productCreate(
        product: {
            title: $title
            descriptionHtml: $descriptionHtml
            vendor: $vendor
            productType: $productType
            tags: $tags
            status: $status
        }
    ) {
        product {
            id
            title
            handle
            status
            variants(first: 1) {
                nodes {
                    id
                    price
                }
            }
        }
        userErrors {
            field
            message
        }
    }
}

mutation ProductUpdate(
    $id: ID!
    $title: String
    $descriptionHtml: String
    $status: ProductStatus
    $media: [CreateMediaInput!]
) {
    productUpdate(
        product: { id: $id, title: $title, descriptionHtml: $descriptionHtml, status: $status }
        media: $media
    ) {
        product {
            id
            title
            descriptionHtml
            status
            variants(first: 1) {
                nodes {
                    id
                    price
                }
            }
            media(first: 20) {
                edges {
                    node {
                        ... on MediaImage {
                            id
                            image {
                                ...ImageFields
                            }
                        }
                    }
                }
            }
        }
        userErrors {
            field
            message
        }
    }
}

mutation ProductVariantsBulkUpdate(
    $productId: ID!
    $variants: [ProductVariantsBulkInput!]!
) {
    productVariantsBulkUpdate(productId: $productId, variants: $variants) {
        product {
            id
            title
        }
        productVariants {
            id
            price
            compareAtPrice
        }
        userErrors {
            field
            message
        }
    }
}

mutation ProductDelete($productId: ID!) {
    productDelete(input: { id: $productId }) {
        deletedProductId
        userErrors {
            field
            message
        }
    }
}