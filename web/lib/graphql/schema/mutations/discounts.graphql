mutation CreateBundleAutomaticDiscount($discount: DiscountAutomaticAppInput!) {
    discountAutomaticAppCreate(automaticAppDiscount: $discount) {
        automaticAppDiscount {
            discountId
            title
            status
        }
        userErrors {
            field
            message
            code
        }
    }
}

mutation UpdateBundleDiscountMetafield(
    $id: ID!
    $metafields: [MetafieldInput!]!
) {
    discountAutomaticAppUpdate(
        id: $id
        automaticAppDiscount: { metafields: $metafields }
    ) {
        automaticAppDiscount {
            discountId
        }
        userErrors {
            field
            message
            code
        }
    }
}
