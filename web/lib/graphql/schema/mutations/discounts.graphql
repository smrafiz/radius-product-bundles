mutation CreateBundleAutomaticDiscount($discount: DiscountAutomaticAppInput!) {
    discountAutomaticAppCreate(automaticAppDiscount: $discount) {
        automaticAppDiscount {
            discountId
        }
        userErrors {
            field
            message
            code
        }
    }
}

query CheckBundleDiscountExists($query: String!) {
    discountNodes(first: 1, query: $query) {
        edges {
            node {
                id
                discount {
                    ... on DiscountAutomaticApp {
                        title
                        status
                    }
                }
            }
        }
    }
}