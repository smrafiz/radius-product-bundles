mutation CreateBundleAutomaticDiscount($discount: DiscountAutomaticAppInput!) {
    discountAutomaticAppCreate(automaticAppDiscount: $discount) {
        automaticAppDiscount {
            discountId
            title
            status
        }
        userErrors {
            field
            message
            code
        }
    }
}

mutation CreateBundleDiscounts(
    $productDiscount: DiscountAutomaticAppInput!
    $shippingDiscount: DiscountAutomaticAppInput!
) {
    productDiscount: discountAutomaticAppCreate(automaticAppDiscount: $productDiscount) {
        automaticAppDiscount {
            discountId
            title
            status
        }
        userErrors {
            field
            message
            code
        }
    }
    shippingDiscount: discountAutomaticAppCreate(automaticAppDiscount: $shippingDiscount) {
        automaticAppDiscount {
            discountId
            title
            status
        }
        userErrors {
            field
            message
            code
        }
    }
}

query CheckBundleDiscountExists($query: String!) {
    discountNodes(first: 1, query: $query) {
        edges {
            node {
                id
                discount {
                    ... on DiscountAutomaticApp {
                        title
                        status
                    }
                }
            }
        }
    }
}

query CheckBundleDiscountsExist($productQuery: String!, $shippingQuery: String!) {
    productDiscount: discountNodes(first: 1, query: $productQuery) {
        edges {
            node {
                id
            }
        }
    }
    shippingDiscount: discountNodes(first: 1, query: $shippingQuery) {
        edges {
            node {
                id
            }
        }
    }
}