query GetProductById($id: ID!) {
    product(id: $id) {
        id
        title
        handle
        vendor
        productType
        tags
        totalInventory
        descriptionHtml
        media(first: 20) {
            edges {
                node {
                    ... on MediaImage {
                        __typename
                        id
                        image {
                            ...ImageFields
                        }
                    }
                }
            }
        }
    }
}

query GetProductsByIds($ids: [ID!]!) {
    nodes(ids: $ids) {
        ... on Product {
            id
            title
            handle
            vendor
            productType
            featuredMedia {
                ... on MediaImage {
                    id
                    image {
                        ...ImageFields
                    }
                }
            }
            variants(first: 100) {
                nodes {
                    id
                    title
                    price
                    compareAtPrice
                    sku
                    inventoryQuantity
                    availableForSale
                    image {
                        ...ImageFields
                    }
                }
            }
        }
    }
}

query GetBundleProducts($ids: [ID!]!) {
    nodes(ids: $ids) {
        ... on Product {
            id
            title
            handle
            featuredMedia {
                ... on MediaImage {
                    id
                    image {
                        ...ImageFields
                    }
                }
            }
            variants(first: 50) {
                nodes {
                    id
                    title
                    price
                    compareAtPrice
                    availableForSale
                }
            }
        }
    }
}
