query GetProducts(
    $first: Int!
    $after: String
    $query: String
    $sortKey: ProductSortKeys
    $reverse: Boolean
) {
    products(
        first: $first
        after: $after
        query: $query
        sortKey: $sortKey
        reverse: $reverse
    ) {
        edges {
            node {
                ...ProductFields
                allCollections: collections(first: 100) {
                    edges {
                        node {
                            id
                            title
                            handle
                        }
                    }
                }
            }
            cursor
        }
        pageInfo {
            ...PageInfoFields
        }
    }
}

query GetProductById($id: ID!) {
    product(id: $id) {
        id
        title
        handle
        vendor
        productType
        tags
        totalInventory
        descriptionHtml
        featuredMedia {
            ... on MediaImage {
                id
                image {
                    ...ImageFields
                }
            }
        }
        media(first: 10) {
            edges {
                node {
                    ... on MediaImage {
                        id
                        image {
                            ...ImageFields
                        }
                    }
                }
            }
        }
    }
}

query GetProductsByIds($ids: [ID!]!) {
    nodes(ids: $ids) {
        ... on Product {
            ...ProductFields
        }
    }
}

query GetBundleProducts($ids: [ID!]!) {
    nodes(ids: $ids) {
        ... on Product {
            id
            title
            handle
            featuredMedia {
                ... on MediaImage {
                    id
                    image {
                        ...ImageFields
                    }
                }
            }
            variants(first: 50) {
                nodes {
                    id
                    title
                    price
                    compareAtPrice
                }
            }
        }
    }
}
