query filesCheckOrphaned($fileQuery: String!) {
    files(first: 1, query: $fileQuery) {
        edges {
            node {
                ... on MediaImage {
                    id
                }
            }
        }
    }
}

query FileStatusByIds($ids: [ID!]!) {
    nodes(ids: $ids) {
        ... on MediaImage {
            id
            fileStatus
            image {
                url
            }
        }
    }
}
