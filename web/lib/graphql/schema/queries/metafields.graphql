query GetProductBundleMetafield($productId: ID!) {
    product(id: $productId) {
        id
        metafield(namespace: "$app", key: "bundle_ids") {
            id
            value
        }
    }
}

query GetProductsBundleMetafields($productIds: [ID!]!) {
    nodes(ids: $productIds) {
        ... on Product {
            id
            metafield(namespace: "$app", key: "bundle_ids") {
                id
                value
            }
        }
    }
}

query CheckMetafieldDefinition {
    metafieldDefinitions(
        first: 1
        ownerType: PRODUCT
        namespace: "$app"
        key: "bundle_ids"
    ) {
        edges {
            node {
                id
                name
            }
        }
    }
}

query CheckBundleDiscountExists($query: String!) {
    discountNodes(first: 1, query: $query) {
        edges {
            node {
                id
                discount {
                    ... on DiscountAutomaticApp {
                        title
                        status
                    }
                }
            }
        }
    }
}

query GetBundleDiscountId($query: String!) {
    discountNodes(first: 1, query: $query) {
        edges {
            node {
                id
            }
        }
    }
}

query GetProductsWithBundleMetafield($cursor: String) {
    products(
        first: 50
        after: $cursor
        query: "metafields.namespace:'$app' AND metafields.key:'bundle_ids'"
    ) {
        edges {
            node {
                id
                metafield(namespace: "$app", key: "bundle_ids") {
                    id
                    namespace
                    key
                }
            }
        }
        pageInfo {
            hasNextPage
            endCursor
        }
    }
}

query GetShopMetafields {
    shop {
        id
        activeBundles: metafield(namespace: "$app", key: "active_bundles") {
            id
            value
        }
        globalSettings: metafield(namespace: "$app", key: "global_settings") {
            id
            value
        }
    }
}
