query GetProductBundleMetafield($productId: ID!) {
    product(id: $productId) {
        id
        metafield(namespace: "radius_bundles", key: "bundle_ids") {
            id
            value
        }
    }
}

query GetProductsBundleMetafields($productIds: [ID!]!) {
    nodes(ids: $productIds) {
        ... on Product {
            id
            metafield(namespace: "radius_bundles", key: "bundle_ids") {
                id
                value
            }
        }
    }
}

query CheckMetafieldDefinition {
    metafieldDefinitions(
        first: 1
        ownerType: PRODUCT
        namespace: "radius_bundles"
        key: "bundle_ids"
    ) {
        edges {
            node {
                id
                name
            }
        }
    }
}

query CheckBundleDiscountExists($query: String!) {
    discountNodes(first: 1, query: $query) {
        edges {
            node {
                id
                discount {
                    ... on DiscountAutomaticApp {
                        title
                        status
                    }
                }
            }
        }
    }
}

query GetBundleDiscountId($query: String!) {
    discountNodes(first: 1, query: $query) {
        edges {
            node {
                id
            }
        }
    }
}

# Get shop-level metafields (active bundles and global settings)
query GetShopMetafields {
    shop {
        id
        activeBundles: metafield(
            namespace: "radius_bundles"
            key: "active_bundles"
        ) {
            id
            value
        }
        globalSettings: metafield(
            namespace: "radius_bundles"
            key: "global_settings"
        ) {
            id
            value
        }
    }
}
