query GetShopId {
    shop {
        id
    }
}

query GetShopInfo {
    shop {
        currencyCode
        myshopifyDomain
        email
        name
        plan {
            publicDisplayName
        }
        shopAddress {
            countryCodeV2
        }
        ianaTimezone
    }
}

query GetPublications($first: Int!) {
    publications(first: $first) {
        nodes {
            id
            supportsFuturePublishing
        }
    }
}

query GetShopLocales {
    shopLocales {
        locale
        name
        primary
        published
    }
}
