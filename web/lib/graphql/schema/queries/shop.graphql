query GetShopId {
    shop {
        id
    }
}

query GetShopInfo {
    shop {
        currencyCode
        myshopifyDomain
        email
        name
        plan {
            displayName
        }
        billingAddress {
            countryCode
        }
        ianaTimezone
    }
}

query GetPublications($first: Int!) {
    publications(first: $first) {
        nodes {
            id
            supportsFuturePublishing
        }
    }
}
