fragment ProductCardFields on Product {
    id
    title
    handle
    vendor
    featuredMedia {
        ... on MediaImage {
            id
            image {
                ...ImageFields
            }
        }
    }
    priceRangeV2 {
        minVariantPrice {
            ...MoneyFields
        }
        maxVariantPrice {
            ...MoneyFields
        }
    }
}

